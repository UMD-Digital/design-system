# .github/workflows/style-docs.yml
name: Generate and Deploy Documentation

on:
  push:
    branches:
      - main
      - feature/actions
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages in dependency order
        run: |
          pnpm exec lerna run build --scope=@universityofmaryland/web-icons-library
          pnpm exec lerna run build --scope=@universityofmaryland/web-token-library
          pnpm exec lerna run build --scope=@universityofmaryland/web-styles-library
          pnpm exec lerna run build --scope=@universityofmaryland/web-utilities-library
          pnpm exec lerna run build --scope=@universityofmaryland/web-builder-library
          pnpm exec lerna run build --scope=@universityofmaryland/web-model-library
          pnpm exec lerna run build --scope=@universityofmaryland/web-elements-library
          pnpm exec lerna run build --scope=@universityofmaryland/web-feeds-library
          pnpm exec lerna run build --scope=@universityofmaryland/web-components-library

      - name: Generate package documentation
        run: |
          pnpm run icons:docs
          pnpm run tokens:docs
          pnpm run utilities:docs
          pnpm run styles:docs
          pnpm run model:docs
          pnpm run elements:docs
          pnpm run feeds:docs
          pnpm run components:docs

      - name: Remove .gitignore files from docs subdirectories
        run: find docs -mindepth 2 -name ".gitignore" -delete

      - name: Upload generated docs as artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs
          retention-days: 90

      - name: Deploy to GitHub Pages
        if: ${{ !env.ACT }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          clean: true
          commit-message: 'docs: update documentation [skip ci]'
